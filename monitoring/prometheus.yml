global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "lacco-backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["lacco-backend:8081"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"