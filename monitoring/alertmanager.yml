global:
  resolve_timeout: 1m

route:
  receiver: 'default'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: 'slack-critical'

    - match:
        severity: warning
      receiver: 'slack-warning'

receivers:
  - name: 'default'
    slack_configs:
      - api_url: 'SLACK_URL_DEFAULT_PLACEHOLDER'
        channel: '#alerts'
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"

  - name: 'slack-critical'
    slack_configs:
      - api_url: 'SLACK_URL_CRITICAL_PLACEHOLDER'
        channel: '#alerts-critical'
        send_resolved: true
        title: "🚨 CRITICAL: {{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"

  - name: 'slack-warning'
    slack_configs:
      - api_url: 'SLACK_URL_WARNING_PLACEHOLDER'
        channel: '#alerts-warning'
        send_resolved: true
        title: "⚠️ WARNING: {{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"