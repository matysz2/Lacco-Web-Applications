name: Deploy Lacco (Backend & Frontend to K8s)

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Logowanie do Docker Hub za pomocą dedykowanej akcji (bardziej stabilna)
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Budowanie i wysyłanie Backend-u z unikalnym tagiem (SHA) oraz tagiem latest
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lacco-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/lacco-app:latest

      # 4. Budowanie i wysyłanie Frontend-u z unikalnym tagiem (SHA) oraz tagiem latest
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:latest

      # 5. Konfiguracja połączenia z klastrem Kubernetes
      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 6. Aktualizacja obrazów w Kubernetesie i weryfikacja (Zero Downtime)
      - name: Deploy to Kubernetes
        run: |
          # Aktualizacja backendu nowym, unikalnym obrazem
          kubectl set image deployment/lacco-backend lacco-backend=${{ secrets.DOCKER_USERNAME }}/lacco-app:${{ github.sha }}
          
          # Aktualizacja frontendu nowym, unikalnym obrazem
          kubectl set image deployment/lacco-frontend lacco-frontend=${{ secrets.DOCKER_USERNAME }}/lacco-frontend:${{ github.sha }}
          
          # Czekanie na poprawne wdrożenie (jeśli testy zdrowia nie przejdą, proces zgłosi błąd)
          kubectl rollout status deployment/lacco-backend
          kubectl rollout status deployment/lacco-frontend