name: Deploy Lacco (Backend & Frontend)

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/lacco-app:latest -f Backend/Dockerfile Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/lacco-app:latest

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:latest -f Frontend/Dockerfile Frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:latest

      - name: Deploy on server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Podmiana placeholderów w konfiguracji Alertmanagera na serwerze
            # Zakładamy, że pliki monitoringu znajdują się w katalogu monitoring/
            sed -i "s|SLACK_URL_DEFAULT_PLACEHOLDER|${{ secrets.SLACK_WEBHOOK_URL_DEFAULT }}|g" monitoring/alertmanager.yml
            sed -i "s|SLACK_URL_CRITICAL_PLACEHOLDER|${{ secrets.SLACK_WEBHOOK_URL_CRITICAL }}|g" monitoring/alertmanager.yml
            sed -i "s|SLACK_URL_WARNING_PLACEHOLDER|${{ secrets.SLACK_WEBHOOK_URL_WARNING }}|g" monitoring/alertmanager.yml

            # 2. Pobranie najnowszych obrazów
            docker pull ${{ secrets.DOCKER_USERNAME }}/lacco-app:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:latest

            # 3. Aktualizacja BACKENDU
            docker stop lacco-backend || true
            docker rm lacco-backend || true
            docker run -d \
              --restart unless-stopped \
              --network monitoring \
              --name lacco-backend \
              -p 8081:8081 \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              ${{ secrets.DOCKER_USERNAME }}/lacco-app:latest

            # 4. Aktualizacja FRONTENDU
            docker stop lacco-frontend || true
            docker rm lacco-frontend || true
            docker run -d \
              --restart unless-stopped \
              --network monitoring \
              --name lacco-frontend \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:latest

            # 5. Restart Alertmanagera, aby załadował nową konfigurację z linkami Slack
            docker restart alertmanager || true

            # 6. Czyszczenie nieużywanych obrazów
            docker image prune -f