name: Deploy Lacco (Backend & Frontend to K8s)

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Logowanie do Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Budowanie i wysyłanie Backend-u
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lacco-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/lacco-app:latest

      # 4. Budowanie i wysyłanie Frontend-u
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:latest

      # 5. Instalacja pluginu uwierzytelniającego GKE przez oficjalne repozytorium Google
      - name: Install GKE Auth Plugin
        run: |
          echo "Adding Google Cloud SDK repository..."
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] http://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          
          echo "Updating and installing plugin..."
          sudo apt-get update -y
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      # 6. Konfiguracja połączenia z klastrem Kubernetes
      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 7. Aktualizacja obrazów w Kubernetesie
      - name: Deploy to Kubernetes
        run: |
          # Wymuszenie użycia zainstalowanego pluginu
          export USE_GKE_GCLOUD_AUTH_PLUGIN=True
          
          # Aktualizacja backendu
          kubectl set image deployment/lacco-backend lacco-backend=${{ secrets.DOCKER_USERNAME }}/lacco-app:${{ github.sha }}
          
          # Aktualizacja frontendu
          kubectl set image deployment/lacco-frontend lacco-frontend=${{ secrets.DOCKER_USERNAME }}/lacco-frontend:${{ github.sha }}
          
          # Weryfikacja rolloutu
          kubectl rollout status deployment/lacco-backend
          kubectl rollout status deployment/lacco-frontend
