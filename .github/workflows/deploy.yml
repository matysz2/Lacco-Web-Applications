name: Deploy Lacco (Backend & Frontend to K8s)

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Logowanie do Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Budowanie i wysyłanie obrazów (Backend & Frontend)
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lacco-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/lacco-app:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/lacco-frontend:latest

      # Logowanie do Google Cloud
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Instalacja i ustawienie komponentów Google Cloud SDK
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # Instalacja pluginu auth dla GKE
      - name: Install GKE Auth Plugin
        run: |
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] http://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update -y
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      # Konfiguracja połączenia z klastrem Kubernetes
      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # DYNAMICZNE POBIERANIE IP RUNNERA GITHUB
      - name: Get GitHub Actions Runner IP
        id: ip
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=${PUBLIC_IP}" >> $GITHUB_OUTPUT

      # AUTORYZACJA IP W KLASTRZE GKE Z OCZEKIWANIEM NA PROPAGACJĘ
      - name: Authorize GitHub Runner IP in GKE
        run: |
          gcloud container clusters update lacco-cluster-prod \
            --zone europe-central2-a \
            --project poetic-chariot-495412-t1 \
            --enable-master-authorized-networks \
            --master-authorized-networks ${{ steps.ip.outputs.runner_ip }}/32
          
          echo "Oczekiwanie 60 sekund na pelna aktywacje i propagacje regul sieciowych w Google Cloud..."
          sleep 60

      # Aktualizacja obrazów w Kubernetesie
      - name: Deploy to Kubernetes
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        run: |
          kubectl set image deployment/lacco-backend lacco-backend=${{ secrets.DOCKER_USERNAME }}/lacco-app:${{ github.sha }}
          kubectl set image deployment/lacco-frontend lacco-frontend=${{ secrets.DOCKER_USERNAME }}/lacco-frontend:${{ github.sha }}
          
          kubectl rollout status deployment/lacco-backend
          kubectl rollout status deployment/lacco-frontend

      # CZYSZCZENIE: Calkowite wylaczenie blokady IP (przywrocenie otwartej sieci dla dewelopmentu)
      - name: Clean up Authorized Networks
        if: always()
        run: |
          gcloud container clusters update lacco-cluster-prod \
            --zone europe-central2-a \
            --project poetic-chariot-495412-t1 \
            --no-enable-master-authorized-networksgit add