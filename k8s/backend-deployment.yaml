apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacco-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lacco-backend
  template:
    metadata:
      labels:
        app: lacco-backend
    spec:
      containers:
      - name: lacco-backend
        image: matysz21/lacco-app:latest
        ports:
        - containerPort: 8081      # Poprawiony port aplikacji
        livenessProbe:
          httpGet:
            path: /
            port: 8081             # Pukamy do portu 8081
          initialDelaySeconds: 150 # 2.5 minuty - bezpieczny czas dla Javy na słabej maszynie
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8081             # Pukamy do portu 8081
          initialDelaySeconds: 120 # 2 minuty - czas na połączenie z bazą i JPA
          periodSeconds: 15
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?prepareThreshold=0"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres.xsojbzwydgdjtaabgygd"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lacco-secrets
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: lacco-secrets
              key: jwt-secret
        - name: MAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lacco-secrets
              key: mail-password
        - name: VITE_API_URL
          value: "http://backend:8080" # Port 8080 to port wirtualny Serwisu K8s
        - name: FRONTEND_URL
          value: "http://localhost:30080"
        volumeMounts:
        - name: lacco-storage
          mountPath: /app/data
      volumes:
      - name: lacco-storage
        persistentVolumeClaim:
          claimName: lacco-data-pvc