apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacco-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lacco-frontend
  template:
    metadata:
      labels:
        app: lacco-frontend
    spec:
      containers:
      - name: lacco-frontend
        image: matysz21/lacco-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_URL
          value: "http://backend:8080" # Tu dzieje się magia – używamy nazwy serwisu!
